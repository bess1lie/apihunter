<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style-color="#1e1b4b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="500" fill="url(#grad1)" />
  
  <!-- Abstract background shapes -->
  <circle cx="1500" cy="100" r="200" fill="#4f46e5" fill-opacity="0.1" />
  <circle cx="100" cy="400" r="300" fill="#6366f1" fill-opacity="0.05" />
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.05"/>
  </pattern>
  <rect width="1600" height="500" fill="url(#grid)" />

  <!-- Text -->
  <text x="50%" y="45%" font-family="sans-serif" font-size="120" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">apihunter</text>
  <text x="50%" y="58%" font-family="sans-serif" font-size="40" fill="#94a3b8" text-anchor="middle">Automated REST API Security Reconnaissance</text>
  
  <!-- Decorative elements (representing code/api) -->
  <rect x="750" y="350" width="100" height="10" rx="5" fill="#6366f1" fill-opacity="0.3" />
  <rect x="750" y="375" width="150" height="10" rx="5" fill="#6366f1" fill-opacity="0.2" />
  <rect x="750" y="400" width="80" height="10" rx="5" fill="#6366f1" fill-opacity_0.1" />
</svg>
