<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop_opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop_opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1600" height="500" fill="url(#bannerGrad)" />
  <rect width="1600" height="500" fill="url(#grid)" />
  
  <!-- Decorative glow -->
  <circle cx="1500" cy="100" r="300" fill="#6366f1" opacity="0.05" />
  <circle cx="100" cy= "400" r="300" fill="#a855f7" opacity="0.05" />

  <text x="50%" y="45%" font-family="sans-serif" font-size="120" font-weight="bold" fill="white" text-anchor="middle">apihunter</text>
  <text x="50%" y="58%" font-family="sans-serif" font-size="40" fill="#94a3b8" text-anchor="middle">Automated REST API Security Reconnaissance</text>
  
  <!-- Abstract Data/API representations -->
  <rect x="100" y="100" width="200" height="20" rx="10" fill="#6366f1" opacity="0.2" />
  <rect x="100" y="130" width="150" height="20" rx="10" fill="#6366f1" opacity="0.1" />
  <rect x="1300" y="350" width="180" height="20" rx="10" fill="#a855f7" opacity="0.2" />
  <rect x="1300" y="380" width="120" height="20" rx="10" fill="#a855f7" opacity="0.1" />
